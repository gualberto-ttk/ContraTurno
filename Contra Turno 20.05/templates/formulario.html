<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Meu Cadastro</title>

<style>

body{
background-color: #dcdcdc;
font-family: Arial;
display: flex;
justify-content: center;
align-items: center;
height: 100vh;
margin: 0;
}

.caixa{
background-color: white;
width: 300px;
padding: 20px;
border-radius: 10px;
}

h1{
text-align: center;
color: blue;
}

input{
width: 95%;
padding: 8px;
margin-bottom: 10px;
}

button{
width: 100%;
padding: 10px;
background-color: blue;
color: white;
border: none;
border-radius: 5px;
}

button:hover{
background-color: darkblue;
}

</style>

</head>

<body>

<div class="caixa">

<h1>Cadastro</h1>

<form action="/resultado" method="GET">

Nome:
<input type="text" name="nome">

Curso:
<input type="text" name="curso">

Cidade:
<input type="text" name="cidade">

E-mail:
<input type="email" name="email">

<button type="submit">Enviar</button>

</form>

</div>

</body>
</html>
